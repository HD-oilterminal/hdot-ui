name: HDOT Design System

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Storybook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: hd-oilterminal.github.io

      - uses: actions/checkout@v4
        with:
          repository: HD-oilterminal/hdot-tmaster-front
          ref: features/scaffolding
          path: hdot-tmaster-front
          token: ${{ secrets.GH_PAT }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: hd-oilterminal.github.io/pnpm-lock.yaml
      - name: Stub .nuxt/tsconfig.json
        run: mkdir -p hdot-tmaster-front/.nuxt && echo '{"compilerOptions":{}}' > hdot-tmaster-front/.nuxt/tsconfig.json

      - run: pnpm install --frozen-lockfile
        working-directory: hd-oilterminal.github.io
      - run: pnpm build-storybook
        working-directory: hd-oilterminal.github.io
        env:
          VITE_REALGRID_KEY: ${{ secrets.VITE_REALGRID_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: hd-oilterminal.github.io/storybook-static/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
